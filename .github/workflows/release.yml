name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_NAME: justapps

jobs:
  build:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      attestations: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: app
            context: .
            file: Dockerfile
            image_suffix: ""
          - service: backend
            context: services/backend
            file: services/backend/Dockerfile
            image_suffix: -backend
          - service: frontend
            context: services/frontend
            file: services/frontend/Dockerfile
            image_suffix: -frontend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  chart:
    name: Package & Push Helm Chart
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Prepare chart metadata
        id: chart_meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "registry_repo=oci://${{ env.REGISTRY }}/${OWNER}/charts" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package charts/justapps \
            --destination dist \
            --version "${{ steps.chart_meta.outputs.version }}" \
            --app-version "${{ steps.chart_meta.outputs.version }}"

      - name: Push Helm chart
        run: |
          helm push "dist/${{ env.CHART_NAME }}-${{ steps.chart_meta.outputs.version }}.tgz" \
            "${{ steps.chart_meta.outputs.registry_repo }}"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - build
      - chart
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect pre-release
        id: release_type
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-.+$'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=legacy" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          VERSION="${CURRENT_TAG#v}"

          # Determine previous tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            # First release: include all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD")
          fi

          # Group commits by type
          FEATURES=$(echo "$COMMITS" | grep -E "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^- fix" || true)
          CHORES=$(echo "$COMMITS" | grep -E "^- (chore|refactor|docs|style|test|ci|perf|build)" || true)
          OTHERS=$(echo "$COMMITS" | grep -vE "^- (feat|fix|chore|refactor|docs|style|test|ci|perf|build)" || true)

          BODY=""

          if [ -n "$FEATURES" ]; then
            BODY="${BODY}### Features\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$CHORES" ]; then
            BODY="${BODY}### Chores\n${CHORES}\n\n"
          fi
          if [ -n "$OTHERS" ]; then
            BODY="${BODY}### Other Changes\n${OTHERS}\n\n"
          fi

          REGISTRY="${{ env.REGISTRY }}"
          IMAGE="${{ env.IMAGE_NAME }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BODY="${BODY}### Docker Images\n\`\`\`\ndocker pull ${REGISTRY}/${IMAGE}:${VERSION}\ndocker pull ${REGISTRY}/${IMAGE}-backend:${VERSION}\ndocker pull ${REGISTRY}/${IMAGE}-frontend:${VERSION}\n\`\`\`\n\n"
          BODY="${BODY}### Helm Chart\n\`\`\`\nhelm registry login ${REGISTRY} -u <github-user>\nhelm install justapps oci://${REGISTRY}/${OWNER}/charts/${{ env.CHART_NAME }} --version ${VERSION}\n\`\`\`"

          # Multiline output for GitHub Actions
          {
            echo "body<<EOF"
            printf "%b" "$BODY"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
          else
            echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          make_latest: ${{ steps.release_type.outputs.make_latest }}
          generate_release_notes: true
