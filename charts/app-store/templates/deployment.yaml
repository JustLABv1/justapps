{{- if eq .Values.deploymentMode "monolith" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-store.fullname" . }}
  labels:
    {{- include "app-store.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app-store.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "app-store.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "app-store.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.monolith.image.repository }}:{{ .Values.monolith.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.monolith.image.pullPolicy }}
          ports:
            - name: frontend
              containerPort: 3000
              protocol: TCP
            - name: backend
              containerPort: 8082
              protocol: TCP
          env:
            - name: AUTH_KEYCLOAK_ID
              value: {{ .Values.config.oidc.clientId | quote }}
            - name: AUTH_KEYCLOAK_SECRET
              value: {{ .Values.config.oidc.clientSecret | quote }}
            - name: AUTH_KEYCLOAK_ISSUER
              value: {{ .Values.config.oidc.issuer | quote }}
            - name: AUTH_ADMIN_GROUP
              value: {{ .Values.config.oidc.adminGroup | quote }}
            - name: NEXT_PUBLIC_API_URL
              value: "http://localhost:8082"
            - name: NEXTAUTH_URL
              value: {{ .Values.frontend.env.nextauthUrl | quote }}
            - name: AUTH_SECRET
              value: {{ .Values.frontend.env.authSecret | quote }}
          volumeMounts:
            - name: config
              mountPath: /etc/app-store
            - name: data
              mountPath: /app/data
      volumes:
        - name: config
          configMap:
            name: {{ include "app-store.fullname" . }}-backend-config
        - name: data
          emptyDir: {}
{{- else }}
# Microservices Mode - Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-store.fullname" . }}-backend
  labels:
    {{- include "app-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "app-store.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "app-store.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: backend
              containerPort: 8082
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/justwms
            - name: data
              mountPath: /app/data
      volumes:
        - name: config
          configMap:
            name: {{ include "app-store.fullname" . }}-backend-config
        - name: data
          emptyDir: {}
---
# Microservices Mode - Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-store.fullname" . }}-frontend
  labels:
    {{- include "app-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "app-store.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "app-store.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: AUTH_KEYCLOAK_ID
              value: {{ .Values.config.oidc.clientId | quote }}
            - name: AUTH_KEYCLOAK_SECRET
              value: {{ .Values.config.oidc.clientSecret | quote }}
            - name: AUTH_KEYCLOAK_ISSUER
              value: {{ .Values.config.oidc.issuer | quote }}
            - name: AUTH_ADMIN_GROUP
              value: {{ .Values.config.oidc.adminGroup | quote }}
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.frontend.env.apiUrl | quote }}
            - name: NEXTAUTH_URL
              value: {{ .Values.frontend.env.nextauthUrl | quote }}
            - name: AUTH_SECRET
              value: {{ .Values.frontend.env.authSecret | quote }}
{{- end }}
