{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app-store.fullname" . }}-postgresql
  labels:
    {{- include "app-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: {{ .Values.postgresql.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.postgresql.service.port | default 5432 }}
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "app-store.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}