# Default values for app-store.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# deploymentMode: "monolith" or "microservices"
deploymentMode: microservices

replicaCount: 1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Configuration for both modes
config:
  logLevel: info
  database:
    server: postgres-service
    port: 5432
    name: app_store
    user: postgres
    password: "changeme"
  jwt Secret: "changeme-secret"
  oidc:
    enabled: true
    issuer: "https://keycloak.example.com/realms/myrealm"
    clientId: "app-store"
    clientSecret: "changeme"
    adminGroup: "admin"

# Monolith specific configuration (both frontend and backend in one container)
monolith:
  image:
    repository: ghcr.io/justwms/app-store
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 80
    backendPort: 8082
    frontendPort: 3000

# Microservices specific configuration
backend:
  replicaCount: 1
  image:
    repository: ghcr.io/justwms/app-store-backend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8182 # External port for the service
  resources: {}

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/justwms/app-store-frontend
    pullPolicy: IfNotPresent
    tag: "latest"
  env:
    # URL of the backend API (internal or external)
    apiUrl: "http://app-store-backend:8182"
    nextauthUrl: "http://app-store.example.com"
    authSecret: "secret-for-nextauth"
  service:
    type: ClusterIP
    port: 80
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

nodeSelector: {}

tolerations: []

affinity: {}
