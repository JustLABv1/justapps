# Default values for app-store.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# deploymentMode: "monolith" or "microservices"
deploymentMode: microservices

replicaCount: 1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Configuration for both modes
config:
  logLevel: info
  database:
    # If using the internal postgresql (postgresql.enabled=true), the server should be:
    # <release-name>-app-store-postgresql
    server: app-store-postgresql
    port: 5432
    name: app_store
    user: postgres
    password: "changeme"
  jwtSecret: "changeme-secret"
  oidc:
    enabled: true
    issuer: "https://keycloak.example.com/realms/myrealm"
    clientId: "app-store"
    clientSecret: "changeme"
    adminGroup: "admin"

# Monolith specific configuration (both frontend and backend in one container)
monolith:
  image:
    repository: ghcr.io/justwms/app-store
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 80
    backendPort: 8082
    frontendPort: 3000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# Microservices specific configuration
backend:
  replicaCount: 1
  image:
    repository: ghcr.io/justwms/app-store-backend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8182 # External port for the service
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/justwms/app-store-frontend
    pullPolicy: IfNotPresent
    tag: "latest"
  env:
    # URL of the backend API (internal or external)
    # Default assumes microservices mode with backend service name
    apiUrl: "http://app-store-backend:8182"
    nextauthUrl: "http://app-store.example.com"
    authSecret: "secret-for-nextauth"
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

postgresql:
  enabled: true
  image: 'postgres:16'
  pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClassName: default
    size: 20Gi
  auth:
    database: "app-store"
    password: "app-store"
    username: "app-store"
  service:
    type: ClusterIP
    port: 5432
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}
