## Default values for justapps
## This file contains documented defaults that users should override
## (do NOT commit real secrets into this file).

# deploymentMode: "monolith" or "microservices"
deploymentMode: monolith

# Global replica count when running monolith
replicaCount: 1

# Image pull secrets (if you use a private registry)
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

## ServiceAccount configuration
serviceAccount:
  create: false
  # annotations: map of annotations to apply to the ServiceAccount
  annotations: {}
  # explicit name for the SA; leave empty to use chart-generated name
  name: ""

# Pod annotations (map)
podAnnotations: {}

# Pod/Container security contexts
podSecurityContext: {}
# Example: fsGroup: 2000

securityContext: {}
# Example: capabilities/drop: ["ALL"], runAsNonRoot: true

## Configuration consumed by the backend and frontend
config:
  # Logging level for the application (info|warn|error|debug)
  logLevel: info
  # Port used by the backend process inside the container
  port: 8080
  database:
    # When using the bundled Postgres (postgresql.enabled=true) this should
    # normally resolve to <release-name>-justapps-postgresql
    server: justapps-postgresql
    port: 5432
    name: justapps
    user: postgres
    # Leave passwords empty here; provide them via Kubernetes Secrets or Vault
    password: ""
  # JWT signing secret: keep empty here and provide via Secret
  jwtSecret: ""
  oidc:
    enabled: true
    issuer: "https://login-keycloak.example.com/realms/example"
    clientId: justapps
    # Client secret must be provided via Secret or Vault
    clientSecret: ""
    adminGroup: justapps-admin
    insecure: false
  gitlab:
    # List of GitLab provider integrations.
    # Token is treated as a secret and never placed in the ConfigMap.
    # Provide it via secrets.create=true (inline token) or tokenSecretRef (external secret).
    providers: []
    # Example:
    # providers:
    #   - key: my-gitlab          # unique identifier (used to derive env var name)
    #     label: My GitLab        # display label
    #     baseUrl: https://gitlab.example.com
    #     enabled: true
    #     namespaceAllowlist: []  # empty = all namespaces allowed
    #     timeoutSeconds: 15
    #     token: ""               # inline token — stored in chart secret when secrets.create=true
    #     # OR reference an existing Kubernetes secret:
    #     # tokenSecretRef:
    #     #   name: my-gitlab-token-secret
    #     #   key: token
  cors:
    # Origins allowed to access the API (list)
    allowedOrigins: []

## Monolith configuration (single container includes frontend + backend)
monolith:
  image:
    repository: ghcr.io/justlabv1/justapps
    pullPolicy: IfNotPresent
    # Tag should point to a released version of the monolith image
    tag: "latest"
  service:
    type: ClusterIP
    port: 80
    backendPort: 8080
    frontendPort: 3000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

## Microservices configuration (separate backend + frontend)
backend:
  replicaCount: 1
  image:
    repository: ghcr.io/justlabv1/justapps
    pullPolicy: IfNotPresent
    tag: backend
  service:
    type: ClusterIP
    # External port used for service routing; container listens on 8082
    port: 8182
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/justlabv1/justapps
    pullPolicy: IfNotPresent
    tag: frontend
  env:
    # URL of the backend API (used by frontend). Change to your public API URL.
    apiUrl: "https://justapps.example.com/api/v1"
    nextauthUrl: "https://justapps.example.com"
    # NEXTAUTH secret must come from Kubernetes Secret or Vault
    authSecret: ""
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

## Ingress configuration
ingress:
  enabled: true
  className: ""
  annotations:
    # Example for OpenShift routes
    route.openshift.io/termination: edge
  hosts:
    - host: justapps.example.com
      paths:
        - path: /
          pathType: Prefix
        - path: /api/v1
          pathType: Prefix
          port: 8080
  tls: []

## Uploads / file persistence
uploads:
  persistence:
    enabled: false
    # storageClassName: ocs-external-storagecluster-ceph-rbd
    size: 5Gi

## Embedded Postgres (if enabled)
postgresql:
  enabled: false
  image: 'postgres:18-alpine3.22'
  pullPolicy: IfNotPresent
  mountPath: /bitnami/postgresql/data
  persistence:
    enabled: true
    storageClassName: ocs-external-storagecluster-ceph-rbd
    size: 20Gi
  auth:
    database: justapps
    # password: keep empty here; use Kubernetes Secret or Vault
    password: ""
    username: postgres
  # Service configuration for the PostgreSQL Service created by the chart
  service:
    type: ClusterIP
    port: 5432

## Secret handling helpers
secrets:
  # If true, the chart will create a Kubernetes Secret using chart values.
  # Default: false for safety — prefer external Secrets or Vault.
  create: false
  # Vault integration (optional). Disable by default.
  vault:
    enabled: false
    authRef: ""
    type: kv-v2
    mount: secrets
    namespace: ""
    path: ""
    refreshAfter: 30s
    destination:
      create: false
  # If you manage a Secret externally, put the name here.
  existingSecret: ""

# Custom CA certificate (optional)
# To trust a self-signed or private CA, create a Kubernetes Secret or ConfigMap
# with your CA certificate and set these values. The CA will be mounted into the
# container at the specified path.
customCA:
  enabled: false
  # Name of the Secret or ConfigMap containing the CA cert (must have key ca.crt)
  name: ""
  # Set to true if using a Secret, false for ConfigMap
  secret: true
  # Mount path inside the container
  mountPath: /etc/ssl/certs/extra-ca.crt

nodeSelector: {}

tolerations: []

affinity: {}
