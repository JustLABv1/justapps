{{- if .Values.ingress.enabled -}}
{{- $fullName := include "justapps.fullname" . -}}
{{- $frontendSvcPort := .Values.frontend.service.port -}}
{{- $backendSvcPort := .Values.backend.service.port -}}
{{- if eq .Values.deploymentMode "monolith" -}}
  {{- $frontendSvcPort = .Values.monolith.service.port -}}
  {{- $backendSvcPort = .Values.monolith.service.backendPort -}}
{{- end -}}
{{- if and .Values.ingress.className (not (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion)) -}}
  {{- if not (hasKey .Values.ingress.annotations "kubernetes.io/ingress.class") -}}
    {{- $_ := set .Values.ingress.annotations "kubernetes.io/ingress.class" .Values.ingress.className -}}
  {{- end -}}
{{- end -}}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "justapps.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if and .Values.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          {{- $useBackend := default false .backend }}
          - path: {{ .path }}
            {{- if semverCompare ">=1.18-0" $.Capabilities.KubeVersion.GitVersion }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: {{ if eq $.Values.deploymentMode "monolith" }}{{ $fullName }}{{ else if .serviceName }}{{ .serviceName }}{{ else if $useBackend }}{{ $fullName }}-backend{{ else }}{{ $fullName }}-frontend{{ end }}
                port:
                  number: {{ .port | default (ternary $backendSvcPort $frontendSvcPort $useBackend) }}
              {{- else }}
              serviceName: {{ if eq $.Values.deploymentMode "monolith" }}{{ $fullName }}{{ else if .serviceName }}{{ .serviceName }}{{ else if $useBackend }}{{ $fullName }}-backend{{ else }}{{ $fullName }}-frontend{{ end }}
              servicePort: {{ .port | default (ternary $backendSvcPort $frontendSvcPort $useBackend) }}
              {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
