apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "justapps.fullname" . }}-backend-config
  labels:
    {{- include "justapps.labels" . | nindent 4 }}
data:
  config.yaml: |
    log_level: {{ .Values.config.logLevel }}
    port: {{ if eq .Values.deploymentMode "monolith" }}{{ .Values.monolith.service.backendPort | default 8080 }}{{ else }}{{ .Values.backend.service.port | default 8080 }}{{ end }}
    database:
      server: {{ if .Values.postgresql.enabled }}{{ include "justapps.fullname" . }}-postgresql{{ else }}{{ .Values.config.database.server }}{{ end }}
      port: {{ if .Values.postgresql.enabled }}5432{{ else }}{{ .Values.config.database.port }}{{ end }}
      name: {{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.database | default "postgres" }}{{ else }}{{ .Values.config.database.name }}{{ end }}
      user: {{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.username | default "postgres" }}{{ else }}{{ .Values.config.database.user }}{{ end }}
    oidc:
      enabled: {{ .Values.config.oidc.enabled }}
      issuer: {{ .Values.config.oidc.issuer | quote }}
      client_id: {{ .Values.config.oidc.clientId | quote }}
      admin_group: {{ .Values.config.oidc.adminGroup | quote }}
      insecure: {{ .Values.config.oidc.insecure | default false }}
    cors:
      allowed_origins: 
        {{- toYaml .Values.config.cors.allowedOrigins | nindent 8 }}
