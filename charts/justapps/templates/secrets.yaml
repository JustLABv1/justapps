{{- if and .Values.secrets.create (not .Values.secrets.vault.enabled) }}
{{- include "justapps.validateManagedSecretRefs" . }}
{{- $generatedName := printf "%s-secrets" (include "justapps.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $generatedName }}
  labels:
    {{- include "justapps.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if eq (include "justapps.secretRefName" (dict "root" . "ref" "databasePassword")) $generatedName }}
  {{ include "justapps.secretRefKey" (dict "root" . "ref" "databasePassword") | quote }}: {{ .Values.config.database.password | b64enc | quote }}
  {{- end }}
  {{- if eq (include "justapps.secretRefName" (dict "root" . "ref" "postgresqlPassword")) $generatedName }}
  {{ include "justapps.secretRefKey" (dict "root" . "ref" "postgresqlPassword") | quote }}: {{ .Values.postgresql.auth.password | b64enc | quote }}
  {{- end }}
  {{- if eq (include "justapps.secretRefName" (dict "root" . "ref" "jwtSecret")) $generatedName }}
  {{ include "justapps.secretRefKey" (dict "root" . "ref" "jwtSecret") | quote }}: {{ .Values.config.jwtSecret | b64enc | quote }}
  {{- end }}
  {{- if eq (include "justapps.secretRefName" (dict "root" . "ref" "repositoryProviderEncryptionSecret")) $generatedName }}
  {{ include "justapps.secretRefKey" (dict "root" . "ref" "repositoryProviderEncryptionSecret") | quote }}: {{ .Values.config.repositoryProviderEncryption.secret | default "" | b64enc | quote }}
  {{- end }}
  {{- if eq (include "justapps.secretRefName" (dict "root" . "ref" "frontendAuthSecret")) $generatedName }}
  {{ include "justapps.secretRefKey" (dict "root" . "ref" "frontendAuthSecret") | quote }}: {{ .Values.frontend.env.authSecret | b64enc | quote }}
  {{- end }}
{{- end }}
