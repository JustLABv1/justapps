{{- $secretName := .Values.secrets.existingSecret | default (printf "%s-secrets" (include "justapps.fullname" .)) }}
{{- if eq .Values.deploymentMode "monolith" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "justapps.fullname" . }}
  labels:
    {{- include "justapps.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "justapps.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "justapps.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "justapps.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.monolith.image.repository }}:{{ .Values.monolith.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.monolith.image.pullPolicy }}
          ports:
            - name: frontend
              containerPort: {{ .Values.monolith.service.frontendPort | default 3000 }}
              protocol: TCP
            - name: backend
              containerPort: {{ .Values.monolith.service.backendPort | default 8080 }}
              protocol: TCP
          env:
            - name: BACKEND_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: database-password
            - name: BACKEND_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: jwt-secret
            - name: BACKEND_OIDC_ENABLED
              value: {{ .Values.config.oidc.enabled | quote }}
            - name: BACKEND_OIDC_ISSUER
              value: {{ .Values.config.oidc.issuer | quote }}
            - name: BACKEND_OIDC_CLIENT_ID
              value: {{ .Values.config.oidc.clientId | quote }}
            - name: BACKEND_OIDC_ADMIN_GROUP
              value: {{ .Values.config.oidc.adminGroup | quote }}
            - name: BACKEND_OIDC_INSECURE
              value: {{ .Values.config.oidc.insecure | default false | quote }}
            {{- if .Values.config.cors.allowedOrigins }}
            - name: BACKEND_CORS_ALLOWED_ORIGINS
              value: {{ join "," .Values.config.cors.allowedOrigins | quote }}
            {{- end }}
            - name: AUTH_KEYCLOAK_ID
              value: {{ .Values.config.oidc.clientId | quote }}
            - name: AUTH_KEYCLOAK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: oidc-client-secret
            - name: AUTH_KEYCLOAK_ISSUER
              value: {{ .Values.config.oidc.issuer | quote }}
            - name: AUTH_ADMIN_GROUP
              value: {{ .Values.config.oidc.adminGroup | quote }}
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.frontend.env.apiUrl | default (printf "http://localhost:%d" (.Values.monolith.service.backendPort | default 8080 | int)) | quote }}
            - name: NEXTAUTH_URL
              value: {{ .Values.frontend.env.nextauthUrl | quote }}
            - name: AUTH_URL
              value: {{ .Values.frontend.env.nextauthUrl | quote }}
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: nextauth-secret
            {{- if .Values.config.oidc.insecure }}
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.monolith.service.backendPort | default 8080 }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.monolith.service.backendPort | default 8080 }}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.monolith.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: BACKEND_DATA_PATH
              value: /app/data
          volumeMounts:
            - name: config
              mountPath: /etc/justapps
            - name: data
              mountPath: /app/data
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.postgresql.image | default "postgres:16" }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "justapps.fullname" . }}-postgresql.{{ .Release.Namespace }}.svc.cluster.local -p 5432 -U {{ .Values.postgresql.auth.username | default "postgres" }}; do
                echo "waiting for database at {{ include "justapps.fullname" . }}-postgresql.{{ .Release.Namespace }}.svc.cluster.local";
                sleep 2;
              done;
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "justapps.fullname" . }}-backend-config
        - name: data
          {{- if .Values.uploads.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "justapps.fullname" . }}-uploads
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- else }}
# Microservices Mode - Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "justapps.fullname" . }}-backend
  labels:
    {{- include "justapps.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "justapps.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "justapps.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ include "justapps.serviceAccountName" . }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.postgresql.image | default "postgres:16" }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "justapps.fullname" . }}-postgresql.{{ .Release.Namespace }}.svc.cluster.local -p 5432 -U {{ .Values.postgresql.auth.username | default "postgres" }}; do
                echo "waiting for database at {{ include "justapps.fullname" . }}-postgresql.{{ .Release.Namespace }}.svc.cluster.local";
                sleep 2;
              done;
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: backend
              containerPort: 8082
              protocol: TCP
          env:
            - name: BACKEND_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: database-password
            - name: BACKEND_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: jwt-secret
            - name: BACKEND_OIDC_ENABLED
              value: {{ .Values.config.oidc.enabled | quote }}
            - name: BACKEND_OIDC_ISSUER
              value: {{ .Values.config.oidc.issuer | quote }}
            - name: BACKEND_OIDC_CLIENT_ID
              value: {{ .Values.config.oidc.clientId | quote }}
            - name: BACKEND_OIDC_ADMIN_GROUP
              value: {{ .Values.config.oidc.adminGroup | quote }}
            - name: BACKEND_OIDC_INSECURE
              value: {{ .Values.config.oidc.insecure | default false | quote }}
            {{- if .Values.config.cors.allowedOrigins }}
            - name: BACKEND_CORS_ALLOWED_ORIGINS
              value: {{ join "," .Values.config.cors.allowedOrigins | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/justapps
            - name: data
              mountPath: /app/data
      volumes:
        - name: config
          configMap:
            name: {{ include "justapps.fullname" . }}-backend-config
        - name: data
          {{- if .Values.uploads.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "justapps.fullname" . }}-uploads
          {{- else }}
          emptyDir: {}
          {{- end }}
---
# Microservices Mode - Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "justapps.fullname" . }}-frontend
  labels:
    {{- include "justapps.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "justapps.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "justapps.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: {{ include "justapps.serviceAccountName" . }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: AUTH_KEYCLOAK_ID
              value: {{ .Values.config.oidc.clientId | quote }}
            - name: AUTH_KEYCLOAK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: oidc-client-secret
            - name: AUTH_KEYCLOAK_ISSUER
              value: {{ .Values.config.oidc.issuer | quote }}
            - name: AUTH_ADMIN_GROUP
              value: {{ .Values.config.oidc.adminGroup | quote }}
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.frontend.env.apiUrl | quote }}
            - name: NEXTAUTH_URL
              value: {{ .Values.frontend.env.nextauthUrl | quote }}
            - name: AUTH_URL
              value: {{ .Values.frontend.env.nextauthUrl | quote }}
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: nextauth-secret
            {{- if .Values.config.oidc.insecure }}
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
