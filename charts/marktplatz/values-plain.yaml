# Default values for marktplatz.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## Minimal overrides — keep only values that differ from charts/marktplatz/values.yaml

## Monolith image behavior: prefer Always to force pulls in your environment
monolith:
  image:
    pullPolicy: Always
    tag: "0.8.7"

## Enable bundled Postgres for this deployment
postgresql:
  enabled: true

## Production URLs for ingress and frontend
frontend:
  env:
    apiUrl: "https://marktplatz.apps.ocp4.m017-1.ten.prod.pl2cloud.de/api/v1"
    nextauthUrl: "https://marktplatz.apps.ocp4.m017-1.ten.prod.pl2cloud.de"

ingress:
  hosts:
    - host: marktplatz.apps.ocp4.m017-1.ten.prod.pl2cloud.de
      paths:
        - path: /
          pathType: Prefix
        - path: /api/v1
          pathType: Prefix
          port: 8080

## OIDC and CORS values that differ from the example defaults
config:
  oidc:
    issuer: "https://login-keycloak.apps.ocp4.m017-1.ten.prod.pl2cloud.de/realms/m017-1"
    clientId: "marktplatz"
    adminGroup: "Marktplatz-Admin"
    insecure: true
  cors:
    allowedOrigins:
      - "https://marktplatz.apps.ocp4.m017-1.ten.prod.pl2cloud.de"

## Secrets: enable Vault fetch for this environment (chart will create VaultStaticSecret)
secrets:
  create: true
  vault:
    enabled: true
    authRef: vault-secrets-operator/vso-saas-integration-m017-1
    type: kv-v2
    mount: secrets
    namespace: plain/demo
    path: jneubert/marktplatz
    refreshAfter: 30s
    destination:
      create: true

nodeSelector: {}

tolerations: []

affinity: {}
