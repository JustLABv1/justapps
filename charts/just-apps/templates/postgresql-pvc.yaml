{{- if and .Values.postgresql.enabled .Values.postgresql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "just-apps.fullname" . }}-postgresql
  labels:
    {{- include "just-apps.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  storageClassName: {{ .Values.postgresql.persistence.storageClassName | default "default" }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.persistence.size | default "20Gi" }}
{{- end }}