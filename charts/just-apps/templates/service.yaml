{{- if eq .Values.deploymentMode "monolith" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "just-apps.fullname" . }}
  labels:
    {{- include "just-apps.labels" . | nindent 4 }}
spec:
  type: {{ .Values.monolith.service.type }}
  ports:
    - port: {{ .Values.monolith.service.port }}
      targetPort: frontend
      protocol: TCP
      name: frontend
    - port: {{ .Values.monolith.service.backendPort }}
      targetPort: backend
      protocol: TCP
      name: backend
  selector:
    {{- include "just-apps.selectorLabels" . | nindent 4 }}
{{- else }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "just-apps.fullname" . }}-backend
  labels:
    {{- include "just-apps.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: backend
      protocol: TCP
      name: backend
  selector:
    {{- include "just-apps.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "just-apps.fullname" . }}-frontend
  labels:
    {{- include "just-apps.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "just-apps.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}
