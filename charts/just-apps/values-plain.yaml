# Default values for just-apps.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## Minimal overrides — keep only values that differ from charts/just-apps/values.yaml

## Monolith image behavior: prefer Always to force pulls in your environment
monolith:
  image:
    pullPolicy: IfNotPresent
    tag: "0.9.5"

## Enable bundled Postgres for this deployment
postgresql:
  enabled: true

## Production URLs for ingress and frontend
frontend:
  env:
    apiUrl: "https://community-store.apps.ocp4.m017-1.ten.prod.pl2cloud.de/api/v1"
    nextauthUrl: "https://community-store.apps.ocp4.m017-1.ten.prod.pl2cloud.de"

ingress:
  hosts:
    - host: just-apps.apps.ocp4.m017-1.ten.prod.pl2cloud.de
      paths:
        - path: /
          pathType: Prefix
        - path: /api/v1
          pathType: Prefix
          port: 8080
    - host: community-store.apps.ocp4.m017-1.ten.prod.pl2cloud.de
      paths:
        - path: /
          pathType: Prefix
        - path: /api/v1
          pathType: Prefix
          port: 8080

## OIDC and CORS values that differ from the example defaults
config:
  oidc:
    issuer: "https://login-keycloak.apps.ocp4.m017-1.ten.prod.pl2cloud.de/realms/m017-1"
    clientId: "just-apps"
    adminGroup: "just-apps-admin"
    insecure: true
  cors:
    allowedOrigins:
      - "https://just-apps.apps.ocp4.m017-1.ten.prod.pl2cloud.de"
      - "https://community-store.apps.ocp4.m017-1.ten.prod.pl2cloud.de"

## Secrets: enable Vault fetch for this environment (chart will create VaultStaticSecret)
secrets:
  create: true
  vault:
    enabled: true
    authRef: vault-secrets-operator/vso-saas-integration-m017-1
    type: kv-v2
    mount: secrets
    namespace: plain/demo
    path: jneubert/just-apps
    refreshAfter: 30s
    destination:
      create: true

nodeSelector: {}

tolerations: []

affinity: {}
